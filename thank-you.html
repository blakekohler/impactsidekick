<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Impact Sidekick</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --teal: #0D7377;
            --teal-light: #14919B;
            --amber: #E8A838;
            --coral: #E85D4C;
            --coral-light: #FF7A6B;
            --slate: #1A2332;
            --cream: #FDF9F3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, var(--coral), var(--amber));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .thank-you-card {
            background: white;
            border-radius: 24px;
            padding: 60px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.15);
        }

        .icon-wrap {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--teal), var(--teal-light));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            animation: pulse 2s ease-in-out infinite;
        }

        .icon-wrap i { color: white; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(13, 115, 119, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px 10px rgba(13, 115, 119, 0.2); }
        }

        h1 {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--slate);
            margin-bottom: 16px;
        }

        p {
            font-size: 1.15rem;
            color: #6B7280;
            line-height: 1.7;
            margin-bottom: 32px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 32px;
            border-radius: 100px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            background: var(--slate);
            color: white;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: var(--teal);
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(13, 115, 119, 0.4);
        }

        .btn i { transition: transform 0.3s ease; }
        .btn:hover i { transform: translateX(4px); }
    </style>
</head>
<body>
    <div class="thank-you-card">
        <div class="icon-wrap">
            <i data-lucide="check" style="width: 40px; height: 40px;"></i>
        </div>
        <h1>Message sent!</h1>
        <p>Thanks for reaching out. We'll get back to you within 1-2 business days to talk about how we can support your mission.</p>
        <a href="/" class="btn">
            <span>Back to Home</span>
            <i data-lucide="arrow-right" style="width: 20px; height: 20px;"></i>
        </a>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
